name: qade
version: "1.0.0"
description: "Quant Analyst Decision Environment"
entry_point: "env:app"

tasks:
  - name: bull_trend
    difficulty: easy
    max_steps: 30
    success_threshold: 0.3
    grader: graders.easy_grader
    grader_fn: grade

  - name: noisy_market
    difficulty: medium
    max_steps: 50
    success_threshold: 0.3
    grader: graders.medium_grader
    grader_fn: grade

  - name: shock_recovery
    difficulty: hard
    max_steps: 80
    success_threshold: 0.3
    grader: graders.hard_grader
    grader_fn: grade

endpoints:
  reset:  "POST /reset"
  step:   "POST /step"
  state:  "GET /state"
  health: "GET /health"
  grade:  "POST /grade"
  score:  "POST /score"
  tasks:  "GET /tasks"

runtime:
  port:      7860
  cpu:       2
  memory_gb: 8

reward:
  min: 0.01
  max: 0.99
  shaped: true
